<!-- templates/admin/gastos/registrar_gasto.html -->
{% extends "layout.html" %}
{% block title %}Registrar Gasto - FerDel Sistema{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="form-container">
        <div class="form-header">
            <h4><i class="bi bi-plus-circle"></i> Registrar Nuevo Gasto</h4>
            <div>
                <a href="{{ url_for('admin_gastos_operativos') }}" class="btn btn-secondary btn-action">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
            </div>
        </div>

        <form method="POST" id="formGasto" autocomplete="off">
            <div class="row">
                <!-- Tipo de Gasto -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Tipo de Gasto <span class="text-danger">*</span></label>
                    <select name="id_tipo_gasto" id="id_tipo_gasto" class="form-select" required>
                        <option value="">Seleccione...</option>
                        {% for tipo in tipos_gasto %}
                        <option value="{{ tipo.ID_Tipo_Gasto }}">{{ tipo.Nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Subcategoría -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Subcategoría</label>
                    <select name="id_subcategoria" id="id_subcategoria" class="form-select">
                        <option value="">Seleccione...</option>
                    </select>
                </div>
                
                <!-- Fecha -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Fecha <span class="text-danger">*</span></label>
                    <input type="date" name="fecha" class="form-control" value="{{ hoy }}" required>
                </div>
                
                <!-- Monto -->
                <div class="col-md-3 mb-3">
                    <label class="form-label">Monto <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" step="0.01" name="monto" class="form-control" placeholder="0.00" required>
                    </div>
                </div>
                
                <!-- Método de Pago -->
                <div class="col-md-3 mb-3">
                    <label class="form-label">Método de Pago</label>
                    <select name="metodo_pago" class="form-select">
                        <option value="EFECTIVO">💵 Efectivo</option>
                        <option value="TRANSFERENCIA">🏦 Transferencia</option>
                        <option value="TARJETA">💳 Tarjeta</option>
                        <option value="CHEQUE">📝 Cheque</option>
                    </select>
                </div>
                
                <!-- N° Factura -->
                <div class="col-md-3 mb-3">
                    <label class="form-label">N° Factura/Comprobante</label>
                    <input type="text" name="n_factura" class="form-control" placeholder="Factura o comprobante">
                </div>
                
                <!-- Proveedor -->
                <div class="col-md-3 mb-3">
                    <label class="form-label">Proveedor</label>
                    <select name="id_proveedor" class="form-select">
                        <option value="">Seleccione...</option>
                        {% for prov in proveedores %}
                        <option value="{{ prov.ID_Proveedor }}">{{ prov.Nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Vehículo (oculto por defecto) -->
                <div class="col-md-4 mb-3" id="div_vehiculo" style="display: none;">
                    <label class="form-label">Vehículo</label>
                    <select name="id_vehiculo" id="id_vehiculo" class="form-select">
                        <option value="">Seleccione...</option>
                        {% for veh in vehiculos %}
                        <option value="{{ veh.ID_Vehiculo }}">{{ veh.Placa }} - {{ veh.Marca }} {{ veh.Modelo }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Campos adicionales para VEHÍCULOS (ocultos por defecto) -->
                <div id="div_vehiculo_detalle" style="display: none;">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Kilometraje</label>
                        <input type="number" name="kilometraje" class="form-control" placeholder="Kilometraje actual">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Tipo Mantenimiento</label>
                        <select name="tipo_mantenimiento" class="form-select">
                            <option value="">Seleccione...</option>
                            <option value="PREVENTIVO">🔧 Preventivo</option>
                            <option value="CORRECTIVO">⚙️ Correctivo</option>
                            <option value="REPARACION">🛠️ Reparación</option>
                            <option value="LLANTAS">🚗 Llantas</option>
                            <option value="COMBUSTIBLE">⛽ Combustible</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Taller / Estación</label>
                        <input type="text" name="taller" class="form-control" placeholder="Nombre del taller">
                    </div>
                </div>
                
                <!-- Descripción -->
                <div class="col-md-12 mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3" placeholder="Detalle del gasto..."></textarea>
                </div>
            </div>
            
            <div class="row mt-3">
                <div class="col-md-12">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-save"></i> Guardar Gasto
                    </button>
                    <a href="{{ url_for('admin_gastos_operativos') }}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    // Cargar subcategorías al seleccionar tipo de gasto
    $('#id_tipo_gasto').change(function() {
        var id_tipo = $(this).val();
        var nombre_tipo = $('#id_tipo_gasto option:selected').text();
        
        if (id_tipo) {
            // Cargar subcategorías
            $.get('/admin/gastos/get_subcategorias', {id_tipo_gasto: id_tipo}, function(data) {
                if (data.success) {
                    var options = '<option value="">Seleccione...</option>';
                    for (var i = 0; i < data.subcategorias.length; i++) {
                        options += '<option value="' + data.subcategorias[i].ID_Subcategoria + '">' + data.subcategorias[i].Nombre + '</option>';
                    }
                    $('#id_subcategoria').html(options);
                } else {
                    $('#id_subcategoria').html('<option value="">Seleccione...</option>');
                }
            });
            
            // Mostrar/ocultar campos de vehículo
            if (nombre_tipo === 'Vehículos') {
                $('#div_vehiculo').slideDown();
                $('#div_vehiculo_detalle').slideDown();
            } else {
                $('#div_vehiculo').slideUp();
                $('#div_vehiculo_detalle').slideUp();
                $('#id_vehiculo').val('');
            }
        } else {
            $('#id_subcategoria').html('<option value="">Seleccione...</option>');
            $('#div_vehiculo').slideUp();
            $('#div_vehiculo_detalle').slideUp();
        }
    });
});
</script>
{% endblock %}
