<!-- templates/admin/gastos/tipo_gasto_form.html -->
{% extends "layout.html" %}
{% block title %}{{ titulo }} - FerDel Sistema{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="form-container">
        <div class="form-header">
            <h4><i class="bi bi-tag"></i> {{ titulo }}</h4>
            <div>
                <a href="{{ url_for('admin.admin_tipos_gasto') }}" class="btn btn-secondary btn-action">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
            </div>
        </div>

        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre <span class="text-danger">*</span></label>
                    <input type="text" name="nombre" class="form-control" 
                           value="{{ tipo.Nombre if tipo else '' }}" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Origen <span class="text-danger">*</span></label>
                    <select name="origen" id="origen" class="form-select" required>
                        <option value="GASTO_DIRECTO" {% if tipo and tipo.Origen == 'GASTO_DIRECTO' %}selected{% endif %}>
                            💸 Gasto Directo
                        </option>
                        <option value="INVENTARIO" {% if tipo and tipo.Origen == 'INVENTARIO' %}selected{% endif %}>
                            📦 Inventario
                        </option>
                    </select>
                </div>
                
                <div class="col-md-6 mb-3" id="div_categoria_inventario" style="display: none;">
                    <label class="form-label">Categoría de Inventario</label>
                    <select name="id_categoria_inventario" class="form-select">
                        <option value="">Seleccione...</option>
                        {% for cat in categorias_inventario %}
                        <option value="{{ cat.ID_Categoria }}" 
                                {% if tipo and tipo.ID_Categoria_Inventario == cat.ID_Categoria %}selected{% endif %}>
                            {{ cat.Descripcion }}
                        </option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">Solo para tipos de origen INVENTARIO</small>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Estado</label>
                    <select name="estado" class="form-select">
                        <option value="Activo" {% if tipo and tipo.Estado == 'Activo' %}selected{% endif %}>Activo</option>
                        <option value="Inactivo" {% if tipo and tipo.Estado == 'Inactivo' %}selected{% endif %}>Inactivo</option>
                    </select>
                </div>
                
                <div class="col-12 mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3">{{ tipo.Descripcion if tipo else '' }}</textarea>
                </div>
            </div>
            
            <div class="row mt-3">
                <div class="col-12">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-save"></i> Guardar
                    </button>
                    <a href="{{ url_for('admin.admin_tipos_gasto') }}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
$(document).ready(function() {
    function toggleCategoriaInventario() {
        var origen = $('#origen').val();
        if (origen === 'INVENTARIO') {
            $('#div_categoria_inventario').show();
        } else {
            $('#div_categoria_inventario').hide();
            $('#div_categoria_inventario select').val('');
        }
    }
    
    $('#origen').change(toggleCategoriaInventario);
    toggleCategoriaInventario();
});
</script>
{% endblock %}
