<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Prohibido - FerDel Sistema</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/ferdel.png">
    
    <style>
        :root {
            --primary-color: #2c5e2e;
            --secondary-color: #10b981;
            --dark-color: #0f172a;
            --body-bg: #f8fafc;
            --text-main: #334155;
            --font-family: 'Outfit', 'Inter', system-ui, sans-serif;
        }
        
        body {
            background-color: var(--body-bg);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Background Pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(rgba(16, 185, 129, 0.04) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        .error-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
        }

        .error-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.8);
            padding: 2.5rem;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .error-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }

        .error-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        }

        /* Animated Icon */
        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.75rem auto;
            font-size: 2.5rem;
            position: relative;
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .error-code {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .error-message {
            font-size: 1rem;
            line-height: 1.6;
            color: #64748b;
            margin-bottom: 2rem;
            padding: 0 10px;
        }

        .btn-dashboard {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white !important;
            border: none;
            font-weight: 600;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-dashboard:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
            background: linear-gradient(135deg, #244d26, #0ea5e9); /* subtle hue shift */
            filter: brightness(1.05);
        }

        .btn-dashboard:active {
            transform: translateY(0);
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 1.25rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .footer-text {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-card">
            <!-- Brand Logo -->
            <img src="/static/ferdel.png" alt="FerDel Logo" class="brand-logo" onerror="this.style.display='none'">
            
            <!-- Lock Icon -->
            <div class="icon-wrapper">
                <i class="bi bi-shield-slash-fill"></i>
            </div>
            
            <!-- Error Code -->
            <div class="error-code">403</div>
            
            <!-- Error Title -->
            <h1 class="error-title">Prohibido</h1>
            
            <!-- Error Message -->
            <p class="error-message">
                No tienes permiso para acceder al recurso solicitado. Está protegida contra lectura o no es legible para el servidor.
            </p>
            
            <!-- CTA Button -->
            <a href="/dashboard" class="btn btn-dashboard">
                <i class="bi bi-house-door-fill"></i>
                <span>Regresar al Dashboard</span>
            </a>
            
            <!-- Footer -->
            <div class="footer-text">
                Granja Avícola FerDel &copy; 2026. Todos los derechos reservados.
            </div>
        </div>
    </div>

</body>
</html>
