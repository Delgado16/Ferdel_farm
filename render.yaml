services:
  - type: web
    name: fer-del-app
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=1 --threads=2 --timeout=60
    envVars:
      - key: RENDER
        value: true
      - key: FLASK_DEBUG
        value: False
      - key: DB_POOL_SIZE
        value: 3
      - key: SECRET_KEY
        generateValue: true